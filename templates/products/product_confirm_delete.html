{% extends 'base.html' %}
{% block title %}Удаление товара{% endblock%}

{% block content %}

<form method="post" enctype="multipart/form-data" class="p-3 bg-info bg-opacity-10 border border-info rounded-end position-absolute top-50 start-50 translate-middle">
    <h3>Вы уверены что хотите удалить товар {{product.name}} с артикулом {{product.article}}?</h3>
    {% csrf_token %}
  <button type="submit" class="btn btn-primary">Удалить</button>
</form>
{% endblock %}
